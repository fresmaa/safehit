<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeHit - API Mocking Dashboard</title>
  </head>
  <body
    class="bg-[#09090b] text-zinc-100 font-sans min-h-screen m-0 selection:bg-violet-500/30 p-8"
  >
    <div class="max-w-6xl mx-auto">
      <header class="mb-10 flex items-center gap-4">
        <div
          class="w-12 h-12 rounded-2xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center shadow-lg shadow-violet-900/20"
        >
          <svg
            class="w-6 h-6 text-violet-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
            ></path>
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white tracking-tight">
            API Mocking Engine
          </h1>
          <p class="text-zinc-400 text-sm mt-1">
            Intercept requests and return custom JSON payloads.
          </p>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <section
          class="lg:col-span-5 bg-white/[0.02] border border-white/5 p-6 rounded-2xl shadow-xl backdrop-blur-sm h-fit"
        >
          <h2
            class="text-sm font-bold text-zinc-300 mb-5 uppercase tracking-widest border-b border-white/5 pb-3"
          >
            Create New Rule
          </h2>

          <div class="space-y-4">
            <div class="flex gap-4">
              <div class="w-1/3">
                <label class="block text-xs font-semibold text-zinc-500 mb-1.5"
                  >Method</label
                >
                <div class="relative">
                  <select
                    id="mock-method"
                    class="w-full appearance-none bg-black/50 border border-white/10 rounded-xl px-4 py-2.5 pr-10 text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-violet-500/30 focus:border-violet-500 transition-all cursor-pointer shadow-inner"
                  >
                    <option value="GET" class="bg-zinc-900 text-white">
                      GET
                    </option>
                    <option value="POST" class="bg-zinc-900 text-white">
                      POST
                    </option>
                    <option value="PUT" class="bg-zinc-900 text-white">
                      PUT
                    </option>
                    <option value="PATCH" class="bg-zinc-900 text-white">
                      PATCH
                    </option>
                    <option value="DELETE" class="bg-zinc-900 text-white">
                      DELETE
                    </option>
                  </select>

                  <div
                    class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-zinc-400"
                  >
                    <svg
                      class="h-4 w-4"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 9l-7 7-7-7"
                      ></path>
                    </svg>
                  </div>
                </div>
              </div>
              <div class="w-2/3">
                <label class="block text-xs font-semibold text-zinc-500 mb-1.5"
                  >Target URL (Contains)</label
                >
                <input
                  type="text"
                  id="mock-url"
                  placeholder="/api/v1/users"
                  class="w-full bg-black/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-violet-500 transition-all"
                />
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-zinc-500 mb-1.5"
                >HTTP Status Code</label
              >
              <input
                type="number"
                id="mock-status"
                value="200"
                class="w-full bg-black/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-violet-500 transition-all"
              />
            </div>

            <div>
              <label class="block text-xs font-semibold text-zinc-500 mb-1.5"
                >Response Body (JSON)</label
              >
              <div
                id="mock-body-editor"
                class="w-full text-sm rounded-xl overflow-hidden border border-white/10 focus-within:border-violet-500 transition-all"
              ></div>
            </div>

            <button
              id="add-mock-btn"
              class="w-full bg-violet-600 hover:bg-violet-500 text-white px-4 py-3 rounded-xl text-sm font-bold transition-all active:scale-95 mt-2"
            >
              Save Mock Rule
            </button>
          </div>
        </section>

        <section class="lg:col-span-7">
          <h2
            class="text-sm font-bold text-zinc-300 mb-5 uppercase tracking-widest pl-1"
          >
            Active Mock Rules
          </h2>
          <div id="mock-list" class="space-y-3"></div>
        </section>
      </div>
    </div>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
