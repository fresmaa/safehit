<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeHit Popup</title>
</head>
<body class="bg-[#09090b] text-zinc-100 font-sans w-[350px] min-h-[400px] m-0 overflow-hidden relative selection:bg-violet-500/30">
  
  <div class="absolute top-[-20%] left-[-10%] w-[200px] h-[200px] bg-violet-600/20 rounded-full blur-[80px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-20%] w-[200px] h-[200px] bg-blue-600/10 rounded-full blur-[80px] pointer-events-none"></div>

  <div class="relative z-10 h-full flex flex-col">
    <header class="p-5 flex items-center gap-3 border-b border-white/5 bg-white/[0.01] backdrop-blur-xl">
      <div class="w-9 h-9 rounded-xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center">
        <svg class="w-4 h-4 text-violet-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path></svg>
      </div>
      <div>
        <h1 class="text-sm font-bold text-zinc-100 tracking-wide">SafeHit</h1>
        <p class="text-[11px] text-zinc-500 font-medium mt-0.5">Environment Safeguard</p>
      </div>
    </header>

    <main class="p-5 flex-1">
      <div class="mb-6">
        <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase tracking-widest">Target URL</label>
        <div class="flex gap-2">
          <input 
            type="text" 
            id="url-input" 
            placeholder="e.g., api.production.com" 
            class="flex-1 bg-black/50 border border-white/10 rounded-xl px-3 py-2 text-[13px] text-white placeholder-zinc-600 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all shadow-inner"
          />
          <button 
            id="add-btn" 
            class="bg-zinc-100 hover:bg-white text-zinc-900 px-4 py-2 rounded-xl text-[13px] font-bold transition-all active:scale-95 shadow-sm shrink-0"
          >
            Add
          </button>
        </div>
      </div>

      <div>
        <h2 class="text-[10px] font-bold text-zinc-400 mb-3 uppercase tracking-widest">Active Protections</h2>
        <div class="h-[180px] overflow-y-auto pr-2 -mr-2 space-y-2 scrollbar-thin scrollbar-thumb-white/10 scrollbar-track-transparent" id="url-list">
          </div>
      </div>
    </main>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
